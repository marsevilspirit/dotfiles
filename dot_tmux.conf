set -g default-terminal screen-256color # set terminal to 256 colors
set-option -ga terminal-overrides ",*256col*:Tc" # set terminal to 256 colors
set -g default-command fish
set -g allow-passthrough all

# -- general
setw -g xterm-keys on # use xterm-style keys
set -s escape-time 0 # set escape time to 0
set -sg repeat-time 300 # set repeat time to 300ms
set -s focus-events on # enable focus events
set -g mouse on # enable mouse support
set -sg exit-empty on # auto exit when the last window is closed

set -q -g status-utf8 on # enable utf-8 encoding
setw -q -g utf8 on # enable utf-8 encoding

set -g visual-activity off # disable window activity indicators
setw -g monitor-activity off # disable window activity indicators
setw -g monitor-bell off # disable window activity indicators 

set -g history-limit 10000 # set history limit to 10000

# -- display
set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows
setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed
set -g set-titles on          # set terminal title
set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time
set -g status-interval 10     # redraw status line every 10 seconds

# -- navigation
# split current window horizontally
bind - split-window -v
# split current window vertically
bind | split-window -h

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
unbind n
unbind p
bind -r C-h previous-window # select previous window
bind -r C-l next-window     # select next window
bind Tab last-window        # move to last active window

# -- buffers & copy mode
setw -g mode-keys vi      # use vi keys in copy mode
# setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# -- reload configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
