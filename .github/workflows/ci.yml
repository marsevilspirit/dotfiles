name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}-linux
      cancel-in-progress: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify chezmoi source paths exist
        run: |
          set -euo pipefail
          test -d dot_config/fish
          test -d dot_config/nvim
          test -d dot_config/ghostty
          test -f dot_ideavimrc
          test -f dot_tmux.conf
          test -f dot_vimrc
          test -f dot_zshrc

      - name: Install chezmoi and Neovim
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl

          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"

          curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
            | tar xz -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Chezmoi diff
        run: |
          set -euo pipefail
          HOME="${RUNNER_TEMP}/dotfiles-ci-home"
          mkdir -p "$HOME"
          chezmoi --source="${GITHUB_WORKSPACE}" --destination="$HOME" diff

      - name: Chezmoi apply + Neovim checkhealth
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/dotfiles-ci-home"
          mkdir -p "$HOME"
          chezmoi --source="${GITHUB_WORKSPACE}" --destination="$HOME" apply --verbose
          test -f "$HOME/.config/nvim/init.lua"
          test -f "$HOME/.config/ghostty/config"
          test -f "$HOME/.ideavimrc"
          test -f "$HOME/.vimrc"
          test -f "$HOME/.zshrc"
          nvim --headless "+checkhealth" "+qa"

  verify-macos:
    runs-on: macos-latest
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}-macos
      cancel-in-progress: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify chezmoi source paths exist
        run: |
          set -euo pipefail
          test -d dot_config/fish
          test -d dot_config/nvim
          test -d dot_config/ghostty
          test -f dot_ideavimrc
          test -f dot_tmux.conf
          test -f dot_vimrc
          test -f dot_zshrc

      - name: Install chezmoi and Neovim
        run: |
          set -euo pipefail
          brew install chezmoi neovim

      - name: Chezmoi diff
        run: |
          set -euo pipefail
          HOME="${RUNNER_TEMP}/dotfiles-ci-home"
          mkdir -p "$HOME"
          chezmoi --source="${GITHUB_WORKSPACE}" --destination="$HOME" diff

      - name: Chezmoi apply + Neovim checkhealth
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/dotfiles-ci-home"
          mkdir -p "$HOME"
          chezmoi --source="${GITHUB_WORKSPACE}" --destination="$HOME" apply --verbose
          test -f "$HOME/.config/nvim/init.lua"
          test -f "$HOME/.config/ghostty/config"
          test -f "$HOME/.ideavimrc"
          test -f "$HOME/.vimrc"
          test -f "$HOME/.zshrc"
          nvim --headless "+checkhealth" "+qa"

  verify-windows:
    runs-on: windows-latest
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}-windows
      cancel-in-progress: true
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Verify chezmoi source paths exist
        run: |
          $ErrorActionPreference = 'Stop'
          @(
            'dot_config/fish',
            'dot_config/nvim',
            'dot_config/ghostty',
            'dot_ideavimrc',
            'dot_tmux.conf',
            'dot_vimrc',
            'dot_zshrc'
          ) | ForEach-Object {
            if (-not (Test-Path $_)) { throw "Missing source path: $_" }
          }

      - name: Install chezmoi and Neovim
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = Join-Path $env:RUNNER_TEMP 'bin'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null

          $release = Invoke-RestMethod 'https://api.github.com/repos/twpayne/chezmoi/releases/latest'
          $asset = $release.assets |
            Where-Object { $_.name -match 'windows_amd64\.zip$' } |
            Select-Object -First 1
          if (-not $asset) { throw 'chezmoi windows_amd64 release asset not found' }
          $chezmoiZip = Join-Path $env:RUNNER_TEMP 'chezmoi-windows-amd64.zip'
          $chezmoiExtract = Join-Path $env:RUNNER_TEMP 'chezmoi-win-extract'
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $chezmoiZip
          New-Item -ItemType Directory -Force -Path $chezmoiExtract | Out-Null
          Expand-Archive $chezmoiZip -DestinationPath $chezmoiExtract -Force
          $chezmoiExe = Get-ChildItem -Path $chezmoiExtract -Recurse -Filter chezmoi.exe |
            Select-Object -First 1
          if (-not $chezmoiExe) { throw 'chezmoi.exe not found after extracting archive' }
          Copy-Item $chezmoiExe.FullName (Join-Path $bin 'chezmoi.exe') -Force
          Add-Content $env:GITHUB_PATH $bin

          $zip = Join-Path $env:RUNNER_TEMP 'nvim-win64.zip'
          $extract = Join-Path $env:RUNNER_TEMP 'nvim-win-extract'
          Invoke-WebRequest `
            -Uri 'https://github.com/neovim/neovim/releases/download/stable/nvim-win64.zip' `
            -OutFile $zip
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          Expand-Archive $zip -DestinationPath $extract -Force
          $nvimExe = Get-ChildItem -Path $extract -Recurse -Filter nvim.exe -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $nvimExe) { throw 'nvim.exe not found after extracting Neovim archive' }
          Add-Content $env:GITHUB_PATH $nvimExe.DirectoryName

      - name: Chezmoi diff
        run: |
          $ErrorActionPreference = 'Stop'
          $tempHome = Join-Path $env:RUNNER_TEMP 'dotfiles-ci-home'
          $env:HOME = $tempHome
          $env:USERPROFILE = $tempHome
          $env:XDG_CONFIG_HOME = Join-Path $tempHome '.config'
          New-Item -ItemType Directory -Force -Path $tempHome | Out-Null
          chezmoi --source="$env:GITHUB_WORKSPACE" --destination="$tempHome" diff

      - name: Chezmoi apply + Neovim checkhealth
        run: |
          $ErrorActionPreference = 'Stop'
          $ws = $env:GITHUB_WORKSPACE
          $tempHome = Join-Path $env:RUNNER_TEMP 'dotfiles-ci-home'
          $env:HOME = $tempHome
          $env:USERPROFILE = $tempHome
          $env:XDG_CONFIG_HOME = Join-Path $tempHome '.config'
          New-Item -ItemType Directory -Force -Path $tempHome | Out-Null

          chezmoi --source="$ws" --destination="$tempHome" apply --verbose
          if (-not (Test-Path (Join-Path $env:XDG_CONFIG_HOME 'nvim\init.lua'))) {
            throw 'Neovim config was not applied by chezmoi'
          }
          if (-not (Test-Path (Join-Path $env:XDG_CONFIG_HOME 'ghostty\config'))) {
            throw 'Ghostty config was not applied by chezmoi'
          }
          if (-not (Test-Path (Join-Path $tempHome '.ideavimrc'))) {
            throw 'IdeaVim config was not applied by chezmoi'
          }
          if (-not (Test-Path (Join-Path $tempHome '.vimrc'))) {
            throw 'Vim config was not applied by chezmoi'
          }
          if (-not (Test-Path (Join-Path $tempHome '.zshrc'))) {
            throw 'Zsh config was not applied by chezmoi'
          }
          nvim --headless "+checkhealth" "+qa"
